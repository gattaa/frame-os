name: "frame-os Uploader"
slug: "frame_uploader"
description: >-
  FastAPI ingest + processing sidecar for frame-os. Serves its own upload page
  (opened as an HA Ingress sidebar panel), saves uploads (with the {uploader,
  caption, channel:"ha", ts} sidecar) into share/frame/incoming, and processes
  each one inline (EXIF rotation, downscale, re-encode, strip EXIF) into
  config/www/frame so the frame-os display PWA can read it at /local/frame/.
  The only add-on in this project's ingest+process pipeline. Reachable via
  Home Assistant Ingress by default — no port is opened on the host.
version: "2.0.1"
arch:
  - amd64
  - aarch64
init: false
boot: auto
startup: services

# Ingress: no `ports:` key here at all, so nothing is published to the host.
# The container is only reachable through the Supervisor's ingress proxy
# (172.30.32.2), which is also enforced at the application layer — see
# RESTRICT_TO_SUPERVISOR in run.sh / src/app.py. panel_icon +
# panel_title make it eligible for the HA sidebar (still requires the user to
# flip "Show in sidebar" on the add-on's Info page — see DOCS.md).
ingress: true
ingress_port: 8099
panel_icon: mdi:image-plus
panel_title: "Frame Photos"

map:
  - type: share
    read_only: false
  - type: homeassistant_config
    read_only: false
    path: /config

options:
  upload_token: ""
  max_upload_mb: 25
  rate_limit_per_min: 12
  allowed_origins: "*"
  max_long_edge: 1280
  jpeg_quality: 85
schema:
  # Required, at least 16 chars — Supervisor refuses to start the add-on until
  # a real secret is set (see ../README.md and DOCS.md for why this matters
  # even behind ingress).
  upload_token: "match(^.{16,}$)"
  max_upload_mb: "int(1,100)"
  rate_limit_per_min: "int(1,120)"
  allowed_origins: "str"
  max_long_edge: "int(320,4000)"
  jpeg_quality: "int(50,100)"
