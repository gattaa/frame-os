name: "frame-os Pipeline Processor"
slug: "frame_pipeline"
description: >-
  Channel-agnostic photo processor for frame-os. Watches share/frame/incoming
  for new photos dropped by ingest channels (the frame-uploader / frame-telegram
  add-ons, or any other channel), normalizes them (EXIF rotation, downscale,
  re-encode, strip EXIF), and publishes photos/ + manifest.json under
  config/www/frame so the frame-os display PWA can read them at /local/frame/.
version: "1.0.0"
arch:
  - amd64
  - aarch64
init: false
boot: auto
startup: services

map:
  - type: share
    read_only: false
  - type: homeassistant_config
    read_only: false
    path: /config

options:
  poll_interval: 30
  max_long_edge: 1280
  jpeg_quality: 85
schema:
  poll_interval: "int(5,3600)"
  max_long_edge: "int(320,4000)"
  jpeg_quality: "int(50,100)"
