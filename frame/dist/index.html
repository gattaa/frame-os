<html lang="en" data-theme="light">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f4f5f7" />

    <title>frame-os</title>

  </head>
  <body>
    <!-- Photo layer: two stacked images we crossfade between. -->
    <div id="stage">
      <img id="photo-a" class="photo" alt="" />
      <img id="photo-b" class="photo" alt="" />
      <div id="photo-meta">
        <span id="sender-chip"></span>
        <span id="caption"></span>
      </div>
    </div>

    <!-- Control-center overlay: transparent over the photo, dims after inactivity
         and wakes on touch (see overlay.ts). Text/icons use drop-shadow for
         legibility; badges and the expand panel fall back to a solid
         semi-opaque fill (blur is enhancement). -->
    <div id="overlay" class="overlay ov-dim">
      <div class="ov-info">
        <div id="clock" class="ov-clock">--:--</div>
        <div class="ov-row ov-dateweather">
          <span id="date"></span>
          <span id="ov-weather" class="ov-weather hidden">
            <span id="weather-icon" class="ov-icon" aria-hidden="true"></span><span id="weather-temp"></span>
          </span>
        </div>
        <div class="ov-row ov-ministats">
          <span class="ov-stat">
            <span class="ov-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="2" y="7" width="18" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                <rect x="21" y="10" width="2" height="4" rx="1" fill="currentColor" />
              </svg>
            </span>
            <span id="battery">--</span><span class="unit">%</span><span id="battery-status" class="battery-status"></span>
          </span>
          <span class="ov-stat">
            <span class="ov-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 11l8-7 8 7" />
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M6 10v9h12v-9" />
              </svg>
            </span>
            <span id="house-power">--</span>
          </span>
        </div>
      </div>

      <div class="ov-badges" id="ac-badges"></div>

      <!-- Floating controls: nav (prev/play-pause/next) + settings gear. Its
           own auto-hide layer — fades fully out on idle, reappears on tap
           (see .ov-controls in styles.css / dim()/wake() in overlay.ts). -->
      <div class="ov-controls" id="ov-controls">
        <div class="ov-nav" id="ov-nav">
          <button type="button" class="nav-btn" id="nav-favourite" aria-label="Add to favourites">
            <svg id="nav-favourite-icon" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M12 21s-7.5-4.686-10-9.033C.686 8.5 2.5 5 6 5c2 0 3.5 1 6 3.5C14.5 6 16 5 18 5c3.5 0 5.314 3.5 4 6.967C19.5 16.314 12 21 12 21z" /></svg>
          </button>
          <button type="button" class="nav-btn" id="nav-prev" aria-label="Previous photo">
            <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 6l-6 6 6 6" /></svg>
          </button>
          <button type="button" class="nav-btn" id="nav-playpause" aria-label="Pause slideshow">
            <svg id="nav-playpause-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M7 5h3v14H7zM14 5h3v14h-3z" /></svg>
          </button>
          <button type="button" class="nav-btn" id="nav-next" aria-label="Next photo">
            <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 6l6 6-6 6" /></svg>
          </button>
          <button type="button" class="nav-btn" id="gallery-open-btn" aria-label="Open gallery">
            <svg viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5" /><rect x="14" y="3" width="7" height="7" rx="1.5" /><rect x="3" y="14" width="7" height="7" rx="1.5" /><rect x="14" y="14" width="7" height="7" rx="1.5" /></g></svg>
          </button>
        </div>

        <button type="button" class="gear-btn" id="settings-gear" aria-label="Settings">
          <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM3.5 12a8.5 8.5 0 0 1 .16-1.64l-1.86-1.45 1.5-2.6 2.2.62c.5-.5 1.08-.92 1.72-1.24l.3-2.28h3l.3 2.28c.64.32 1.22.74 1.72 1.24l2.2-.62 1.5 2.6-1.86 1.45c.1.53.16 1.08.16 1.64s-.06 1.11-.16 1.64l1.86 1.45-1.5 2.6-2.2-.62c-.5.5-1.08.92-1.72 1.24l-.3 2.28h-3l-.3-2.28a6.9 6.9 0 0 1-1.72-1.24l-2.2.62-1.5-2.6 1.86-1.45c-.1-.53-.16-1.08-.16-1.64z" /></svg>
        </button>

        <div class="settings-panel" id="settings-panel">
          <div class="settings-panel-header">
            <span class="settings-panel-title">Display</span>
            <button type="button" class="ac-panel-collapse" id="settings-close" aria-label="Close">
              <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 15l6-6 6 6" /></svg>
            </button>
          </div>

          <div class="settings-row">
            <label class="ac-panel-label" for="brightness-slider">Brightness</label>
            <input type="range" id="brightness-slider" min="1" max="255" step="1" value="200" />
          </div>

          <div class="settings-toggle-row">
            <div>
              <span class="settings-toggle-label">Auto-dim</span>
              <span class="settings-btn-compact-sub">dims to minimum when idle</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="autodim-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <button type="button" class="settings-link" id="settings-advanced-open">
            Advanced
            <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 6l6 6-6 6" /></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Advanced display controls: cache/relaunch escape hatches for a stale
         service-worker/kiosk-app state. Rare enough to not clutter the main
         settings panel — a full-screen takeover, same pattern as gallery. -->
    <div class="advanced-panel" id="advanced-panel">
      <div class="gallery-header">
        <span class="gallery-title">Advanced</span>
        <button type="button" class="gallery-icon-btn" id="advanced-close" aria-label="Close">
          <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 6l12 12M18 6L6 18" /></svg>
        </button>
      </div>
      <div class="advanced-panel-body">
        <button type="button" class="settings-btn" id="settings-clear-cache">
          Clear cache
          <span class="settings-btn-sub">Clears the display app's local cache</span>
        </button>

        <button type="button" class="settings-btn" id="settings-relaunch">
          Reload app
          <span class="settings-btn-sub">Relaunches the display app, not the frame</span>
        </button>

        <button type="button" class="settings-btn settings-btn-danger" id="settings-restart">
          Force refresh
          <span class="settings-btn-sub">Clear cache, then reload — for a stuck/stale display</span>
        </button>
        <div class="settings-confirm" id="settings-restart-confirm">
          <p>Force-refresh the display app now?</p>
          <div class="settings-confirm-actions">
            <button type="button" id="settings-restart-confirm-cancel">Cancel</button>
            <button type="button" id="settings-restart-confirm-yes">Refresh</button>
          </div>
        </div>
      </div>
    </div>

    <span id="stale-dot" class="stale-dot" title="Showing last-known values"></span>

    <!-- Gallery: full-screen touch-scrollable grid of every photo, using
         thumbs/ (not full-size) — see gallery.ts / CLAUDE.md hard constraints
         on the ancient WebView. Pauses the slideshow while open. -->
    <div class="gallery-overlay" id="gallery-overlay">
      <div class="gallery-header">
        <span class="gallery-title">All Photos</span>
        <button type="button" class="gallery-icon-btn" id="gallery-close-btn" aria-label="Close gallery">
          <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 6l12 12M18 6L6 18" /></svg>
        </button>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <!-- Lightbox: one photo at full size, opened by tapping a gallery grid item. -->
    <div class="lightbox-overlay" id="lightbox-overlay">
      <img id="lightbox-img" class="lightbox-img" alt="" />
      <div id="lightbox-meta" class="lightbox-meta">
        <span id="lightbox-chip" class="lightbox-chip"></span>
        <span id="lightbox-caption" class="lightbox-caption"></span>
      </div>
      <button type="button" class="gallery-icon-btn lightbox-back-btn" id="lightbox-back-btn" aria-label="Back to gallery">
        <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 6l-6 6 6 6" /></svg>
      </button>
      <button type="button" class="gallery-icon-btn lightbox-fav-btn" id="lightbox-fav-btn" aria-label="Toggle favourite">
        <svg id="lightbox-fav-icon" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M12 21s-7.5-4.686-10-9.033C.686 8.5 2.5 5 6 5c2 0 3.5 1 6 3.5C14.5 6 16 5 18 5c3.5 0 5.314 3.5 4 6.967C19.5 16.314 12 21 12 21z" /></svg>
      </button>
    </div>

  </body>
</html>
