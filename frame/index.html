<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f4f5f7" />
    <link rel="icon" href="%BASE_URL%icons/icon-192.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/icon-192.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <title>frame-os</title>
  </head>
  <body>
    <!-- Photo layer: two stacked images we crossfade between. -->
    <div id="stage">
      <img id="photo-a" class="photo" alt="" />
      <img id="photo-b" class="photo" alt="" />
      <div id="photo-meta">
        <span id="sender-chip"></span>
        <span id="caption"></span>
      </div>
    </div>

    <!-- Control-center overlay: transparent over the photo, dims after inactivity
         and wakes on touch (see overlay.ts). Text/icons use drop-shadow for
         legibility; badges and the expand panel fall back to a solid
         semi-opaque fill (blur is enhancement). -->
    <div id="overlay" class="overlay ov-dim">
      <div class="ov-info">
        <div id="clock" class="ov-clock">--:--</div>
        <div class="ov-row ov-dateweather">
          <span id="date"></span>
          <span id="ov-weather" class="ov-weather hidden">
            <span id="weather-icon" class="ov-icon" aria-hidden="true"></span><span id="weather-temp"></span>
          </span>
        </div>
        <div class="ov-row ov-ministats">
          <span class="ov-stat">
            <span class="ov-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="2" y="7" width="18" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                <rect x="21" y="10" width="2" height="4" rx="1" fill="currentColor" />
              </svg>
            </span>
            <span id="battery">--</span><span class="unit">%</span><span id="battery-status" class="battery-status"></span>
          </span>
          <span class="ov-stat">
            <span class="ov-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 11l8-7 8 7" />
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M6 10v9h12v-9" />
              </svg>
            </span>
            <span id="house-power">--</span>
          </span>
        </div>
      </div>

      <div class="ov-badges" id="ac-badges"></div>

      <!-- Floating controls: nav (prev/play-pause/next) + settings gear. Its
           own auto-hide layer — fades fully out on idle, reappears on tap
           (see .ov-controls in styles.css / dim()/wake() in overlay.ts). -->
      <div class="ov-controls" id="ov-controls">
        <div class="ov-nav" id="ov-nav">
          <button type="button" class="nav-btn" id="nav-prev" aria-label="Previous photo">
            <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 6l-6 6 6 6" /></svg>
          </button>
          <button type="button" class="nav-btn" id="nav-playpause" aria-label="Pause slideshow">
            <svg id="nav-playpause-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M7 5h3v14H7zM14 5h3v14h-3z" /></svg>
          </button>
          <button type="button" class="nav-btn" id="nav-next" aria-label="Next photo">
            <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 6l6 6-6 6" /></svg>
          </button>
        </div>

        <button type="button" class="gear-btn" id="settings-gear" aria-label="Settings">
          <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM3.5 12a8.5 8.5 0 0 1 .16-1.64l-1.86-1.45 1.5-2.6 2.2.62c.5-.5 1.08-.92 1.72-1.24l.3-2.28h3l.3 2.28c.64.32 1.22.74 1.72 1.24l2.2-.62 1.5 2.6-1.86 1.45c.1.53.16 1.08.16 1.64s-.06 1.11-.16 1.64l1.86 1.45-1.5 2.6-2.2-.62c-.5.5-1.08.92-1.72 1.24l-.3 2.28h-3l-.3-2.28a6.9 6.9 0 0 1-1.72-1.24l-2.2.62-1.5-2.6 1.86-1.45c-.1-.53-.16-1.08-.16-1.64z" /></svg>
        </button>

        <div class="settings-panel" id="settings-panel">
          <div class="settings-panel-header">
            <span class="settings-panel-title">Display</span>
            <button type="button" class="ac-panel-collapse" id="settings-close" aria-label="Close">
              <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 15l6-6 6 6" /></svg>
            </button>
          </div>

          <div class="settings-row">
            <label class="ac-panel-label" for="brightness-slider">Brightness</label>
            <input type="range" id="brightness-slider" min="0" max="255" step="1" value="200" />
          </div>

          <button type="button" class="settings-btn" id="settings-screen-off">
            Screen off
            <span class="settings-btn-sub">Wakes on touch — safe to tap</span>
          </button>

          <button type="button" class="settings-btn settings-btn-danger" id="settings-restart">
            Restart display
            <span class="settings-btn-sub">Soft-restarts the Fully Kiosk app, not the frame</span>
          </button>
          <div class="settings-confirm" id="settings-restart-confirm">
            <p>Restart the display app now?</p>
            <div class="settings-confirm-actions">
              <button type="button" id="settings-restart-confirm-cancel">Cancel</button>
              <button type="button" id="settings-restart-confirm-yes">Restart</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <span id="stale-dot" class="stale-dot" title="Showing last-known values"></span>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
