<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f4f5f7" />
    <link rel="icon" href="%BASE_URL%icons/icon-192.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/icon-192.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <title>frame-os</title>
  </head>
  <body>
    <!-- Photo layer: two stacked images we crossfade between. -->
    <div id="stage">
      <img id="photo-a" class="photo" alt="" />
      <img id="photo-b" class="photo" alt="" />
      <div id="photo-meta">
        <span id="sender-chip"></span>
        <span id="caption"></span>
      </div>
    </div>

    <!-- Control-center overlay: transparent over the photo, dims after inactivity
         and wakes on touch (see overlay.ts). Text/icons use drop-shadow for
         legibility; badges and the expand panel fall back to a solid
         semi-opaque fill (blur is enhancement). -->
    <div id="overlay" class="overlay ov-dim">
      <div class="ov-info">
        <div id="clock" class="ov-clock">--:--</div>
        <div class="ov-row ov-dateweather">
          <span id="date"></span>
          <span id="ov-weather" class="ov-weather hidden">
            <span id="weather-icon" class="ov-icon" aria-hidden="true"></span><span id="weather-temp"></span>
          </span>
        </div>
        <div class="ov-row ov-ministats">
          <span class="ov-stat">
            <span class="ov-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="2" y="7" width="18" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                <rect x="21" y="10" width="2" height="4" rx="1" fill="currentColor" />
              </svg>
            </span>
            <span id="battery">--</span><span class="unit">%</span><span id="battery-status" class="battery-status"></span>
          </span>
          <span class="ov-stat">
            <span class="ov-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 11l8-7 8 7" />
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M6 10v9h12v-9" />
              </svg>
            </span>
            <span id="house-power">--</span>
          </span>
        </div>
      </div>

      <div class="ov-badges" id="ac-badges"></div>
    </div>

    <span id="stale-dot" class="stale-dot" title="Showing last-known values"></span>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
