# frame-os uploader sidecar.
#
# Snippet — merge into your existing stack (the one running nginx + Home
# Assistant), or run standalone with `docker compose up -d` from this folder.
#
# The key line is the volume: this container and the pipeline processor must
# mount the SAME incoming/ directory. The uploader only writes into it; the
# processor reads from it. Nothing here touches photos/ or manifest.json.
services:
  uploader:
    build: .
    # image: frame-os-uploader   # or pin a prebuilt image
    container_name: frame-os-uploader
    restart: unless-stopped
    environment:
      INCOMING_DIR: /data/incoming
      MAX_UPLOAD_MB: "25"
      # Lock CORS to your HA origin(s) in production (comma-separated).
      ALLOWED_ORIGINS: "https://ha.example.com"
      # Optional shared secret; if set, the card must send the same token.
      UPLOAD_TOKEN: ""
    volumes:
      # Host incoming/ <-> container incoming/. Point the left side at the
      # SAME path the processor watches (here: the repo's data/incoming).
      - ../data/incoming:/data/incoming
    # Expose only to the reverse proxy. If nginx runs in the same compose
    # network, drop `ports` and proxy to `http://uploader:8077` by service name.
    ports:
      - "127.0.0.1:8077:8077"
    # networks:            # uncomment to share nginx's network instead
    #   - web
# networks:
#   web:
#     external: true
